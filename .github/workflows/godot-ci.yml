name: "godot-ci export"
on: push

env:
  GODOT_VERSION: 3.3.4
  EXPORT_NAME: source_code
  
  BUTLER_API_KEY: ${{hAbZmUrUw8lmVBkKP5SQvNikJGRiM5jCHnKhjXj9.BUTLER_CREDENTIALS}}
  CHANNEL: linux
  ITCH_GAME: dystopia-app
  ITCH_USER: inhumanity_arts
  PACKAGE: build/linux


jobs:

  export-linux:
    name: Linux Export
    runs-on: ubuntu-20.04
    container:
      image: barichello/godot-ci:3.3.4
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          lfs: true
      - name: Dependencies
        run: |
          apt-get update
          apt-get install libssl-dev -y
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/${GODOT_VERSION}.stable
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          cd $EXPORT_NAME
          godot -v --path /source_code/project.godot --export "Linux/X11" ../build/linux/$EXPORT_NAME.x86_64
      - name: Upload Artifact
        uses: actions/upload-artifact@v1
        with:
          name: linux
          path: build/linux
      - name: Butler Push
        uses: manleydev/butler-publish-itchio-action@master
