name: CI

env:
  GODOT_VERSION: 3.2.2

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  container:
    runs-on: ubuntu-latest
    container: myood/godot-ci-android-export:godot-3.2.2
    steps:
      - uses: actions/checkout@v2.3.2
      - run: |
          mkdir -v -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/${GODOT_VERSION}.stable
          mkdir -v -p ~/.config/godot/
          cp /root/.config/godot/editor_settings-3.tres ~/.config/godot/editor_settings-3.tres
          ls -al
          cd source_code
          cp export_presets.cfg ~/source_code/android/build/export_presets.cfg
          cd /android/build
          ls
          chmod +x gradlew
          godot --verbose --debug --export-debug "Android" mpw-debug.apk
